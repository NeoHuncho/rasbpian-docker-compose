services:
  termix:
    image: ghcr.io/lukegus/termix:latest
    container_name: termix
    restart: unless-stopped
    network_mode: host
    volumes:
      - termix-data:/app/data
    environment:
      NODE_OPTIONS: '--dns-result-order=ipv4first'
      PORT: '4567'

volumes:
  termix-data:
    driver: local